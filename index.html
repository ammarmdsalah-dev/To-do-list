<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>To-do-List</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@500;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">

        <div class="todo-app">
            <h1>Stay Focused</h1>
            <div class="state-container">
                <div class="details">
                    <h3 id="progress-title">keep it up</h3>
                    <div id="progressbar">
                        <div id="progress"></div>
                    </div>
                </div>
                <div class="stats-number">
                    <p id="numbers">0 / 0</p>
                </div>
            </div>





            <form class="input-area">


                <input type="text" id="task-input" placeholder="Add your next win..">
                <button type="submit" id="add-task-btn">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </form>
            <div class="todos-container">
                <ul id="task-list"></ul>
                <div id="empty-state" class="empty-state">
                    <i class="fa-solid fa-clipboard-list"></i>
                    <p>No tasks yet</p>
                    <span>Add your first task and stay focused 🖤 </span>
                </div>


            </div>
            <p class="quote">
                “A strong believer is better and more beloved to Allah than a weak one…
                Be keen on what benefits you, seek help from Allah, and do not give up.”
            </p>




        </div>














    </div>













    <script src="index.js"></script>
</body>

</html>
